<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0F2043">
<title>(주)리치시스템 | 분양현장 시세조사·전략수립 자동화</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=222563608848ddea15db9b5ddf83e859&autoload=false&libraries=services"></script>
<style>
:root{
  --navy:#0F2043;
  --navy-dark:#06101F;
  --navy-mid:#1A2F5A;
  --gold:#FFD700;
  --gold-deep:#C9A961;
  --gold-soft:#E8D49A;
  --cream:#F4ECD8;
  --cream-light:#FBF7EC;
  --ink:#1A1A1A;
  --ink-mute:#5B5B5B;
  --line:rgba(15,32,67,0.12);
  --line-strong:rgba(15,32,67,0.25);
  --warn:#C9362C;
  --pos:#1F7A4D;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Malgun Gothic','Apple SD Gothic Neo','맑은 고딕','Noto Sans KR',sans-serif;
  background:var(--cream-light);
  color:var(--ink);
  line-height:1.55;
  font-size:15px;
  -webkit-text-size-adjust:100%;
}

/* ===== TOP BAR ===== */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 100%);
  color:#fff;
  padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 16px rgba(15,32,67,0.25);
  border-bottom:2px solid var(--gold);
}
.topbar .brand{display:flex;align-items:center;gap:10px}
.topbar .logo{
  width:32px;height:32px;border-radius:6px;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-deep) 100%);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:var(--navy-dark);font-size:14px;letter-spacing:-0.5px;
}
.topbar .brand-txt{display:flex;flex-direction:column;line-height:1.1}
.topbar .brand-txt b{font-size:14px;letter-spacing:-0.3px}
.topbar .brand-txt span{font-size:10px;color:var(--gold-soft);letter-spacing:0.5px;margin-top:2px}
.topbar .ver{font-size:10px;padding:4px 8px;background:rgba(255,215,0,0.15);color:var(--gold);border:1px solid var(--gold-deep);border-radius:3px;letter-spacing:1px}

/* ===== INPUT PANEL ===== */
.input-panel{
  background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);
  color:#fff;
  padding:24px 18px 28px;
  border-bottom:1px solid rgba(255,215,0,0.2);
}
.input-panel h2{
  margin:0 0 4px;
  font-size:18px;letter-spacing:-0.3px;
  display:flex;align-items:center;gap:8px;
}
.input-panel h2::before{content:'';width:18px;height:2px;background:var(--gold)}
.input-panel .sub{color:var(--gold-soft);font-size:11px;letter-spacing:1px;margin-bottom:18px}
.dropzone{
  border:1.5px dashed rgba(255,215,0,0.45);
  background:rgba(255,255,255,0.04);
  border-radius:8px;
  padding:22px 14px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:14px;
}
.dropzone:hover,.dropzone.drag{
  background:rgba(255,215,0,0.08);border-color:var(--gold);
}
.dropzone .icon{font-size:28px;margin-bottom:6px;display:block}
.dropzone .main{font-size:13px;color:#fff;margin-bottom:3px;font-weight:600}
.dropzone .desc{font-size:11px;color:var(--gold-soft);letter-spacing:0.5px}
.dropzone .filename{font-size:12px;color:var(--gold);margin-top:8px;display:none;word-break:break-all}
.dropzone.has-file .filename{display:block}
.dropzone.has-file .desc{display:none}
input[type=file]{display:none}

.field-row{display:grid;gap:10px;margin-bottom:14px}
.field-row.cols{grid-template-columns:1fr 1fr}
.field label{display:block;font-size:11px;color:var(--gold-soft);letter-spacing:1px;margin-bottom:5px;font-weight:600}
.field input,.field select{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,215,0,0.25);
  border-radius:5px;
  padding:11px 12px;
  color:#fff;
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:all .2s;
}
.field input:focus,.field select:focus{
  border-color:var(--gold);background:rgba(255,255,255,0.10);
}
.field input::placeholder{color:rgba(232,212,154,0.5)}

/* Address main input - prominent */
.field.address-main input{
  font-size:16px;
  padding:14px 14px;
  background:rgba(255,255,255,0.10);
  border-color:rgba(255,215,0,0.45);
}
.field.address-main input:focus{
  background:rgba(255,255,255,0.14);
  box-shadow:0 0 0 3px rgba(255,215,0,0.15);
}
.addr-hint{
  font-size:11px;color:var(--gold-soft);
  margin-top:6px;letter-spacing:0.3px;
  padding-left:2px;
}
.addr-hint::before{
  content:'✓ ';color:var(--gold);font-weight:800;
}
.req,.opt{
  display:inline-block;
  font-size:9px;font-weight:800;letter-spacing:1px;
  padding:1px 5px;border-radius:2px;
  margin-left:4px;vertical-align:middle;
}
.req{background:var(--gold);color:var(--navy-dark)}
.opt{background:rgba(255,255,255,0.10);color:var(--gold-soft);border:1px solid rgba(255,215,0,0.25)}

/* Loading spinner */
.btn.primary{position:relative;overflow:hidden}
.btn-loading{display:none;align-items:center;gap:8px;justify-content:center}
.btn.loading .btn-txt{display:none}
.btn.loading .btn-loading{display:inline-flex}
.spinner{
  width:14px;height:14px;
  border:2px solid rgba(15,32,67,0.2);
  border-top-color:var(--navy-dark);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Collapsible PDF option */
.opt-block{
  margin-top:14px;
  border:1px solid rgba(255,215,0,0.2);
  border-radius:5px;
  background:rgba(255,255,255,0.03);
  overflow:hidden;
}
.opt-block summary{
  list-style:none;cursor:pointer;
  padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--gold-soft);
  letter-spacing:-0.2px;font-weight:600;
  user-select:none;
}
.opt-block summary::-webkit-details-marker{display:none}
.opt-block .opt-arrow{
  color:var(--gold);font-size:14px;
  transition:transform .2s;
}
.opt-block[open] .opt-arrow{transform:rotate(180deg)}
.opt-block[open] summary{border-bottom:1px solid rgba(255,215,0,0.15)}
.opt-block .dropzone{margin:14px;border:1.5px dashed rgba(255,215,0,0.35)}

/* API status row */
.api-status{
  display:flex;align-items:center;gap:6px;
  flex-wrap:wrap;
  margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(255,215,0,0.12);
  font-size:10px;color:var(--gold-soft);
  letter-spacing:0.5px;
}
.api-dot{
  width:6px;height:6px;border-radius:50%;
  background:#444;
  display:inline-block;
}
.api-dot.ok{
  background:#3DD17C;
  box-shadow:0 0 6px rgba(61,209,124,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}
.api-name{margin-right:8px;font-weight:600}

/* Report notice banner */
.report-notice{
  background:#FFF8E1;
  border-left:4px solid var(--gold-deep);
  padding:12px 14px;
  display:flex;align-items:flex-start;gap:10px;
  font-size:12px;color:#5A4A1A;
  border-bottom:1px solid var(--line);
}
.rn-ico{font-size:18px;flex-shrink:0}
.rn-txt{flex:1;line-height:1.5}
.rn-txt b{display:block;color:#5A4A1A;font-size:13px;margin-bottom:2px}
.rn-txt span{font-size:11px;color:#856B2A}

/* Embedded Kakao map */
.kakao-wrap{
  background:#07111f;
  border-radius:8px;
  overflow:hidden;
  margin:14px 0 8px;
  border:1px solid var(--line);
  position:relative;
}
.kakao-status{
  padding:10px 14px;
  background:linear-gradient(180deg,#0F2043,#07111f);
  color:var(--gold);
  font-size:11px;letter-spacing:0.5px;font-weight:600;
  border-bottom:1px solid rgba(201,169,97,.25);
  display:flex;align-items:center;gap:8px;
}
.kakao-status .ks-dot{
  width:7px;height:7px;border-radius:50%;
  background:#3DD17C;
  box-shadow:0 0 6px rgba(61,209,124,.6);
  animation:pulse 2s ease-in-out infinite;
}
.kakao-status .ks-dot.err{background:#FF6B6B;animation:none}
.kakao-status .ks-dot.load{background:#FFD700;animation:pulse 1s ease-in-out infinite}
.kakaoMap{width:100%;height:300px;background:#0F2043}
.kakao-chips{
  display:flex;gap:5px;
  padding:8px 10px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  background:#0F2043;
  border-top:1px solid rgba(201,169,97,.15);
}
.kakao-chips::-webkit-scrollbar{display:none}
.kk-chip{
  flex-shrink:0;padding:6px 11px;
  border-radius:14px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,.06);color:#c9d2e5;
  border:1px solid rgba(255,255,255,.12);cursor:pointer;
  white-space:nowrap;
}
.kk-chip.active{
  background:var(--gold);color:var(--navy-dark);
  border-color:var(--gold);
}
.kk-chip .cnt{opacity:.75;margin-left:3px;font-weight:800}

/* Kakao label overlays */
.kk-label{
  position:relative;
  transform:translate(-50%,-100%);
  white-space:nowrap;
  padding:5px 8px;
  border-radius:14px;
  background:#07111f;color:#fff;
  font-size:10px;font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
  border:1.5px solid;
  cursor:pointer;
}
.kk-label.main{
  background:var(--gold);color:var(--navy-dark);
  border:2px solid #fff;
  box-shadow:0 3px 12px rgba(255,215,0,.55);
  font-size:11px;
}
.kk-label.work{border-color:#e0bd7e}
.kk-label.shop{border-color:#6ba3e0}
.kk-label.medical{border-color:#e06b7e}
.kk-label.school{border-color:#7ee0a3}
.kk-label.park{border-color:#a37ee0}
.kk-label.subway{border-color:#8bd3ff}
.kk-info{padding:8px 11px;min-width:180px;color:#111;font-size:11px;line-height:1.45}
.kk-info b{font-size:12px;display:block;margin-bottom:3px}
.kk-info .dist{color:#7b5a16;font-weight:800;margin:3px 0;font-size:10px}
.kk-info a{color:#1565c0;text-decoration:none;font-weight:800;font-size:10px}

.btn-row{display:flex;gap:8px;margin-top:6px}
.btn{
  flex:1;
  border:none;cursor:pointer;
  padding:14px 16px;
  border-radius:5px;
  font-family:inherit;font-size:14px;font-weight:700;
  letter-spacing:-0.3px;
  transition:all .15s;
}
.btn.primary{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-deep) 100%);
  color:var(--navy-dark);
  box-shadow:0 2px 10px rgba(255,215,0,0.25);
}
.btn.primary:active{transform:translateY(1px)}
.btn.ghost{
  background:transparent;color:var(--gold-soft);
  border:1px solid rgba(255,215,0,0.3);
}

/* ===== REPORT ===== */
.report{padding:0;background:var(--cream-light)}

/* slide / section */
.sec{
  background:#fff;
  margin:0;
  padding:32px 20px 36px;
  position:relative;
  border-bottom:8px solid var(--cream);
  scroll-margin-top:60px;
}
.sec:nth-of-type(odd){background:var(--cream-light)}

.sec-num{
  display:inline-block;
  font-size:10px;letter-spacing:3px;
  color:var(--gold-deep);font-weight:700;
  margin-bottom:6px;
}
.sec h3{
  margin:0 0 4px;
  font-size:22px;
  color:var(--navy);
  letter-spacing:-0.5px;
  line-height:1.25;
}
.sec .lead{
  color:var(--ink-mute);
  font-size:13px;
  margin:0 0 22px;
  padding-bottom:14px;
  border-bottom:1px solid var(--line);
  letter-spacing:-0.2px;
}
.sec h4{
  margin:22px 0 10px;
  font-size:14px;color:var(--navy);
  display:flex;align-items:center;gap:8px;
  letter-spacing:-0.2px;
}
.sec h4::before{
  content:'';width:3px;height:14px;background:var(--gold);border-radius:1px;
}

/* COVER */
.cover{
  background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-mid) 100%);
  color:#fff;
  padding:48px 22px 56px;
  position:relative;overflow:hidden;
  border-bottom:0;
}
.cover::before{
  content:'';position:absolute;top:0;right:0;width:140px;height:140px;
  background:radial-gradient(circle at center,rgba(255,215,0,0.18) 0%,transparent 60%);
}
.cover::after{
  content:'';position:absolute;left:-20px;bottom:-20px;width:200px;height:200px;
  border:1px solid rgba(255,215,0,0.1);border-radius:50%;
}
.cover .badge{
  display:inline-block;
  font-size:10px;letter-spacing:3px;color:var(--gold);
  padding:5px 10px;border:1px solid var(--gold-deep);border-radius:2px;
  margin-bottom:18px;font-weight:700;
}
.cover h1{
  margin:0 0 8px;
  font-size:30px;line-height:1.15;
  letter-spacing:-1px;
  font-weight:800;
}
.cover .loc{
  color:var(--gold-soft);font-size:13px;
  letter-spacing:0.5px;margin-bottom:24px;
}
.cover .gold-bar{
  width:48px;height:2px;background:var(--gold);
  margin-bottom:20px;
}
.cover .meta{
  display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;
  font-size:12px;
  padding-top:18px;border-top:1px solid rgba(255,215,0,0.18);
  margin-top:24px;
}
.cover .meta dt{color:var(--gold-soft);letter-spacing:1px;font-size:10px;margin-bottom:3px}
.cover .meta dd{margin:0;color:#fff;font-weight:600;font-size:13px}
.cover .footer{
  margin-top:30px;padding-top:18px;
  border-top:1px solid rgba(255,215,0,0.18);
  display:flex;justify-content:space-between;align-items:center;
  font-size:10px;color:var(--gold-soft);letter-spacing:1px;
}

/* KPI cards */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 18px}
.kpi{
  background:var(--cream);
  border-left:3px solid var(--gold);
  padding:14px 12px;border-radius:4px;
}
.kpi .lab{font-size:10px;color:var(--ink-mute);letter-spacing:1px;margin-bottom:4px;font-weight:600}
.kpi .val{font-size:20px;color:var(--navy);font-weight:800;letter-spacing:-0.5px;line-height:1.1}
.kpi .val small{font-size:11px;color:var(--ink-mute);font-weight:600;margin-left:2px}
.kpi .delta{font-size:10px;margin-top:3px;color:var(--pos);font-weight:700}
.kpi .delta.neg{color:var(--warn)}

/* Verdict box */
.verdict{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);
  color:#fff;padding:18px 16px;border-radius:6px;
  margin:14px 0 8px;
  position:relative;
  border:1px solid var(--gold-deep);
}
.verdict::before{
  content:'전문가 진단';
  position:absolute;top:-9px;left:14px;
  background:var(--gold);color:var(--navy-dark);
  font-size:10px;font-weight:800;letter-spacing:1.5px;
  padding:3px 8px;border-radius:2px;
}
.verdict .v-main{font-size:15px;font-weight:700;letter-spacing:-0.3px;margin-top:4px;color:var(--gold-soft)}
.verdict .v-sub{font-size:12px;color:#fff;margin-top:6px;line-height:1.6}

/* Bullet block */
.blist{margin:0;padding:0;list-style:none}
.blist li{
  padding:10px 0 10px 22px;
  position:relative;
  border-bottom:1px dashed var(--line);
  font-size:13px;
  line-height:1.55;
}
.blist li:last-child{border-bottom:0}
.blist li::before{
  content:'';position:absolute;left:4px;top:16px;
  width:6px;height:6px;background:var(--gold);
  transform:rotate(45deg);
}
.blist li b{color:var(--navy);font-weight:700}
.blist li .tag{
  display:inline-block;font-size:10px;padding:2px 6px;
  background:var(--navy);color:var(--gold);
  border-radius:2px;margin-right:6px;letter-spacing:0.5px;font-weight:700;
}

/* tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0 6px;border-radius:5px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;min-width:480px}
thead th{
  background:var(--navy);color:#fff;
  padding:10px 8px;text-align:center;
  font-weight:600;letter-spacing:-0.3px;
  font-size:11px;
  border-right:1px solid rgba(255,215,0,0.2);
}
thead th:last-child{border-right:0}
tbody td{
  padding:9px 8px;border-bottom:1px solid var(--line);
  text-align:center;
}
tbody tr:nth-child(odd) td{background:var(--cream-light)}
tbody tr.subject td{
  background:var(--navy)!important;
  color:#fff!important;font-weight:700;
  border-bottom:1px solid var(--gold);
}
tbody tr.subject td:first-child{color:var(--gold)!important}
tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
tbody td.name{text-align:left;font-weight:600;color:var(--navy)}
.tbl-cap{font-size:10px;color:var(--ink-mute);text-align:right;margin-top:4px;letter-spacing:0.5px}

/* Persona cards */
.personas{display:grid;gap:10px}
.persona{
  background:#fff;border:1px solid var(--line);
  border-left:4px solid var(--gold-deep);
  padding:12px 14px;border-radius:4px;
}
.persona .ptag{
  display:inline-block;font-size:10px;font-weight:800;
  color:var(--navy);background:var(--gold-soft);
  padding:2px 7px;border-radius:2px;letter-spacing:1px;
  margin-bottom:6px;
}
.persona .ptitle{font-size:13px;color:var(--navy);font-weight:700;margin-bottom:3px}
.persona .pdesc{font-size:12px;color:var(--ink-mute);line-height:1.5}

/* Timeline */
.timeline{position:relative;padding-left:18px;margin:10px 0}
.timeline::before{
  content:'';position:absolute;left:5px;top:6px;bottom:6px;
  width:1px;background:var(--gold-deep);
}
.tl-item{margin-bottom:14px;position:relative}
.tl-item::before{
  content:'';position:absolute;left:-17px;top:5px;
  width:11px;height:11px;border-radius:50%;
  background:var(--gold);border:2px solid var(--navy);
}
.tl-week{font-size:10px;color:var(--gold-deep);letter-spacing:2px;font-weight:800;margin-bottom:2px}
.tl-title{font-size:14px;color:var(--navy);font-weight:700;margin-bottom:3px}
.tl-desc{font-size:12px;color:var(--ink-mute);line-height:1.55}
.tl-kpi{font-size:11px;color:var(--navy);background:var(--cream);padding:4px 8px;border-radius:3px;display:inline-block;margin-top:5px;font-weight:600}

/* Cost simulation */
.sim{background:var(--cream);border-radius:6px;padding:14px;margin:8px 0}
.sim-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:8px 0;border-bottom:1px dashed var(--line-strong);
  font-size:13px;
}
.sim-row:last-child{border-bottom:0;border-top:2px solid var(--navy);margin-top:4px;padding-top:10px;font-weight:800;color:var(--navy);font-size:14px}
.sim-row .lab{color:var(--ink-mute);font-size:12px}
.sim-row .val{font-variant-numeric:tabular-nums;font-weight:700;color:var(--navy)}
.sim-row.pos .val{color:var(--pos)}

/* Materials */
.mats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mat{
  background:#fff;border:1px solid var(--line);
  padding:10px;border-radius:4px;
  font-size:12px;text-align:center;
  position:relative;
}
.mat b{display:block;color:var(--navy);font-size:13px;margin-bottom:2px}
.mat small{color:var(--ink-mute);font-size:10px;letter-spacing:0.5px}
.mat.full{grid-column:span 2;background:var(--navy);color:#fff;border-color:var(--gold)}
.mat.full b{color:var(--gold)}
.mat.full small{color:var(--gold-soft)}

/* Quote / note */
.note{
  font-size:11px;color:var(--ink-mute);
  background:var(--cream);padding:10px 12px;border-radius:4px;
  border-left:3px solid var(--gold-deep);
  line-height:1.6;margin-top:10px;
}
.note b{color:var(--navy)}

/* SWOT */
.swot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.swot-cell{padding:12px 11px;border-radius:4px;font-size:12px;line-height:1.5}
.swot-cell .stitle{font-size:10px;letter-spacing:2px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.swot-cell .stitle::before{content:'';width:8px;height:8px}
.swot-cell.s{background:#E8F2EC;color:#0F4A2C}
.swot-cell.s .stitle{color:#1F7A4D}
.swot-cell.s .stitle::before{background:#1F7A4D}
.swot-cell.w{background:#FBEFEC;color:#6A2A23}
.swot-cell.w .stitle{color:#C9362C}
.swot-cell.w .stitle::before{background:#C9362C}
.swot-cell.o{background:var(--cream);color:#5A4A1A}
.swot-cell.o .stitle{color:var(--gold-deep)}
.swot-cell.o .stitle::before{background:var(--gold-deep)}
.swot-cell.t{background:#EAEAF0;color:#3B3B5A}
.swot-cell.t .stitle{color:#3B3B5A}
.swot-cell.t .stitle::before{background:#3B3B5A}

/* Channel mix */
.chmix{display:grid;gap:6px;margin:8px 0}
.ch-row{display:flex;align-items:center;gap:8px;font-size:12px}
.ch-row .ch-name{flex:0 0 90px;font-weight:700;color:var(--navy);font-size:11px}
.ch-row .ch-bar{flex:1;height:14px;background:var(--cream);border-radius:2px;overflow:hidden;position:relative}
.ch-row .ch-fill{height:100%;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-deep) 100%);border-radius:2px}
.ch-row .ch-pct{flex:0 0 32px;text-align:right;font-weight:700;color:var(--navy);font-size:11px}

/* Final */
.final{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);
  color:#fff;padding:36px 22px 44px;
  text-align:center;position:relative;overflow:hidden;
}
.final::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:100px;height:1px;background:var(--gold);
}
.final .ft{font-size:11px;color:var(--gold);letter-spacing:4px;margin-bottom:14px;font-weight:700}
.final h3{color:#fff;font-size:20px;margin:0 0 12px;line-height:1.35;letter-spacing:-0.5px}
.final h3 em{color:var(--gold);font-style:normal}
.final .fmsg{font-size:13px;color:var(--gold-soft);line-height:1.7;max-width:340px;margin:0 auto}
.final .sign{
  margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,215,0,0.2);
  font-size:11px;color:var(--gold-soft);letter-spacing:1.5px;
}
.final .sign b{color:var(--gold);letter-spacing:0;font-size:13px;display:block;margin-bottom:2px}

/* Bottom actions */
.actions{
  position:sticky;bottom:0;z-index:40;
  background:rgba(255,255,255,0.96);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
  padding:10px 14px;
  display:flex;gap:6px;
  border-top:1px solid var(--line);
}
.act-btn{
  flex:1;padding:11px 8px;font-size:11px;
  font-weight:700;letter-spacing:0.5px;
  background:var(--navy);color:#fff;border:none;border-radius:5px;
  cursor:pointer;font-family:inherit;
}
.act-btn.gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-deep) 100%);color:var(--navy-dark)}
.act-btn:active{opacity:0.85}

/* Mini section nav */
.minimap{
  position:fixed;right:6px;top:50%;transform:translateY(-50%);z-index:30;
  display:flex;flex-direction:column;gap:6px;
}
.minimap a{
  width:8px;height:8px;border-radius:50%;
  background:var(--line-strong);
  display:block;transition:all .2s;
}
.minimap a.active{background:var(--gold);transform:scale(1.4)}

@media (max-width:380px){
  .kpis{grid-template-columns:1fr}
  .cover h1{font-size:26px}
  .sec h3{font-size:20px}
  .field-row.cols{grid-template-columns:1fr}
  .mats{grid-template-columns:1fr}
  .mat.full{grid-column:span 1}
  .swot{grid-template-columns:1fr}
}
@media (min-width:768px){
  body{font-size:16px}
  .input-panel,.sec,.cover,.final{padding-left:48px;padding-right:48px}
  .sec h3{font-size:26px}
  .cover h1{font-size:38px}
  .kpis{grid-template-columns:repeat(4,1fr)}
  .mats{grid-template-columns:repeat(4,1fr)}
  .mat.full{grid-column:span 2}
  .topbar{padding:16px 32px}
}
@media (min-width:1024px){
  body{max-width:900px;margin:0 auto;box-shadow:0 0 40px rgba(15,32,67,0.08)}
}
@media print{
  .topbar,.input-panel,.actions,.minimap{display:none!important}
  .sec{page-break-inside:avoid;padding:24px 32px}
  body{background:#fff;font-size:11pt}
  .cover{page-break-after:always}
}

// ===== 미니맵 재구성 =====
function rebuildMinimap() {
  const minimap = document.getElementById('minimap');
  minimap.innerHTML = '';
  const sections = document.querySelectorAll('[data-sec]');
  sections.forEach((s, i) => {
    const a = document.createElement('a');
    a.href = '#';
    a.addEventListener('click', e => {
      e.preventDefault();
      s.scrollIntoView({behavior:'smooth', block:'start'});
    });
    minimap.appendChild(a);
  });
  const obs = ('IntersectionObserver' in window) ? new IntersectionObserver(entries => {
    entries.forEach(en => {
      if(en.isIntersecting){
        const idx = parseInt(en.target.dataset.sec);
        document.querySelectorAll('.minimap a').forEach((a, i) => {
          a.classList.toggle('active', i === idx);
        });
      }
    });
  }, {threshold: 0.3}) : null;
  if(obs) sections.forEach(s => obs.observe(s));
}

// ===== 프로젝트 매칭 =====
function findProject(addr, name) {
  const text = (addr + ' ' + (name||'')).toLowerCase();
  for(const key in PROJECTS){
    const p = PROJECTS[key];
    if(p.keys.some(k => text.includes(k.toLowerCase()))){
      return {key, project: p};
    }
  }
  return null;
}

// ===== 보고서 적용 =====
function applyProject(project, isMatched, regionLabel) {
  document.getElementById('reportBody').innerHTML = renderReport(project);
  
  const notice = document.getElementById('reportNotice');
  if(!isMatched){
    document.getElementById('rn-title').textContent = `${regionLabel} 지역 자동 생성 — 표준 시세 템플릿 표시 중`;
    document.getElementById('rn-sub').innerHTML = `<b>${regionLabel}</b> 지역 평균 시세·비교군·수요 페르소나로 자동 생성된 보고서입니다. 실제 운영시 4개 API(국토부 실거래·건축물대장·VWorld·카카오)로 해당 주소 실데이터가 자동 호출되어 정확한 매물·평당가로 갱신됩니다.`;
    notice.style.display = 'flex';
  } else {
    notice.style.display = 'none';
  }
  rebuildMinimap();
}

const drop = document.getElementById('drop');
const fileInput = document.getElementById('pdfinput');
const fname = document.getElementById('fname');

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if(f){
    fname.textContent = '📎 ' + f.name + ' (' + (f.size/1024).toFixed(1) + 'KB)';
    drop.classList.add('has-file');
  }
});
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if(f){
    fileInput.files = e.dataTransfer.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

// ===== 생성 버튼 =====
const genBtn = document.getElementById('genBtn');
const addrInput = document.getElementById('addr');
const projInput = document.getElementById('proj');

genBtn.addEventListener('click', () => {
  const addr = addrInput.value.trim();
  if(!addr){
    addrInput.focus();
    addrInput.style.borderColor = '#FF6B6B';
    setTimeout(() => addrInput.style.borderColor = '', 1500);
    return;
  }
  genBtn.classList.add('loading');
  genBtn.disabled = true;
  
  setTimeout(() => {
    const matched = findProject(addr, projInput.value);
    if(matched){
      applyProject(matched.project, true);
    } else {
      // 임의 주소 → 지역 자동 감지 + 데이터 생성
      const regionKey = detectRegion(addr);
      // 울산은 기존 KCC 매칭으로 우선 처리
      if(regionKey === 'kcc_jeonha_match'){
        applyProject(PROJECTS.kcc_jeonha, true);
      } else {
        const projType = document.getElementById('ptype').value;
        const generated = generateProjectFromRegion(addr, projInput.value, projType, regionKey);
        const regionName = REGIONS[regionKey].name;
        applyProject(generated, false, regionName);
      }
    }
    genBtn.classList.remove('loading');
    genBtn.disabled = false;
    document.getElementById('report').scrollIntoView({behavior:'smooth', block:'start'});
  }, 1200);
});

// ===== 지역 자동 감지 =====
function detectRegion(addr) {
  const a = addr.replace(/\s+/g,'');
  // 서울 강서·마곡
  if(/마곡|발산/.test(a)) return 'seoul_magok';
  if(/화곡|강서구|등촌|가양|염창|방화|공항동|개화/.test(a)) return 'seoul_gangseo';
  // 양천·구로
  if(/목동|신정동|신월동|양천구/.test(a)) return 'seoul_yangcheon';
  if(/구로|신도림|가산|독산|개봉|오류동/.test(a)) return 'seoul_guro';
  // 동대문·답십리
  if(/답십리|동대문구|청량리|전농|장안|이문|회기|용두/.test(a)) return 'seoul_dongdaemun';
  // 강남권 프리미엄
  if(/강남|서초|송파|용산구|한남|이태원|반포|잠실|청담|역삼|삼성동|논현|신사|개포|대치|도곡|압구정|이촌/.test(a)) return 'seoul_premium';
  // 마포·성수·홍대
  if(/마포|홍대|연남|망원|합정|상수|성수|왕십리|성동구|서대문/.test(a)) return 'seoul_mapo_yongsan';
  // 기타 서울
  if(/서울특별시|서울시|서울/.test(a)) return 'generic_seoul';
  // 인천
  if(/송도|연수구|청라|영종|검단/.test(a)) return 'incheon_songdo';
  // 경기 판교·분당·동탄
  if(/판교|분당|정자|미금|수내|동탄|광교|영통|용인|수원|성남/.test(a)) return 'gyeonggi_pangyo';
  // 부산 해운대
  if(/해운대|센텀|마린시티|광안|수영|남구|동래/.test(a)) return 'busan_haeundae';
  // 울산 동구
  if(/전하|일산동|울산|남목|방어동/.test(a)) return 'kcc_jeonha_match'; // 기존 KCC 매칭 우선
  // 광역시
  if(/부산|대구|광주|대전|울산|인천/.test(a)) return 'generic_metro';
  // 경기 서남부 (광명·부천·안양·시흥)
  if(/광명|부천|안양|시흥|군포|의왕|과천/.test(a)) return 'generic_seoul';
  // 경기 일산·고양
  if(/일산|고양|파주/.test(a)) return 'generic_seoul';
  // 기타 지방
  return 'generic_provincial';
}

// ===== 지역 템플릿 → 프로젝트 데이터 자동 생성 =====
function generateProjectFromRegion(addr, projName, ptype, regionKey) {
  const r = REGIONS[regionKey];
  const title = (projName && projName.trim() && projName !== '파크라움 여의도 오피스텔') ? projName.trim() : `${r.name} 신축 오피스텔`;
  const pyTypeB = Math.round(r.basePyung * 0.97);
  const pyTypeC = Math.round(r.basePyung * 1.15);
  const supplyB = 19.1, supplyC = 23.8;
  const priceB = Math.round(pyTypeB * supplyB / 10) * 10;
  const priceC = Math.round(pyTypeC * supplyC / 10) * 10;
  const yieldEst = ((r.rentMonthly * 12) / (priceB * 10) * 100).toFixed(1);
  
  const isResid = ptype && ptype.includes('잔여');
  const isPreSale = ptype && ptype.includes('신규');
  const phase = isResid ? '잔여분양' : (isPreSale ? '신규분양 (선분양)' : '신규분양');
  
  return {
    cover: {
      title: title.replace(/\s/g,'<br>'),
      address: addr,
      meta: [
        ['분양유형', phase],
        ['입주예정', isResid ? '즉시입주' : '2027년 예정'],
        ['총세대','오피스텔 추정 80~120실'],
        ['B타입 평당가', pyTypeB.toLocaleString()+'만원'],
        ['지역', r.name],
        ['핵심수요', r.sector.split('·')[0]]

    exec: {
      kpis: [
        ['B타입 평당가', pyTypeB.toLocaleString(),'만/평','지역 평균 -2.0%'],
        ['C타입 평당가', pyTypeC.toLocaleString(),'만/평','지역 평균 +3.5%'],
        ['예상 월세', r.rentMonthly+'','만/월','갭투자 적정'],
        ['예상 수익률', yieldEst,'%/년','자기자본 ROI']

      verdict: {

function kkSetStatus(text, type){

function kkClear(){
  if(kkMainOverlay) kkMainOverlay.setMap(null);
  kkRadiusItems.forEach(c => c.setMap(null));
  kkRadiusItems = [];
  kkOverlays.forEach(o => o.overlay.setMap(null));
  kkOverlays = [];
  if(kkInfowindow) kkInfowindow.close();
}

function kkDrawCenter(latlng, label){
  kkCenter = latlng;
  kkMap.setCenter(latlng);
  kkMap.setLevel(4);
  kkMainOverlay = new kakao.maps.CustomOverlay({
    position: latlng,
    content: '<div class="kk-label main">★ 분양 현장</div>',
    yAnchor: 1.1
  });
  kkMainOverlay.setMap(kkMap);
  // 도보 5/10/15분 반경
  const rings = [
    {r:335, min:5, color:'#FFD700'},
    {r:670, min:10, color:'#C9A961'},
    {r:1005, min:15, color:'#8bd3ff'}
  ];
  rings.forEach(ring => {
    const c = new kakao.maps.Circle({
      center: latlng, radius: ring.r,
      strokeWeight: 2, strokeColor: ring.color, strokeOpacity:.7, strokeStyle:'shortdash',
      fillColor: ring.color, fillOpacity:.04
    });
    c.setMap(kkMap);
    kkRadiusItems.push(c);
    const R = 6371000;
    const dLngDeg = (ring.r/(R*Math.cos(latlng.getLat()*Math.PI/180)))*(180/Math.PI);
    const labelPos = new kakao.maps.LatLng(latlng.getLat(), latlng.getLng()+dLngDeg);
    const ringLabel = new kakao.maps.CustomOverlay({
      position: labelPos,
      content: '<div style="padding:3px 6px;background:rgba(7,17,31,.92);color:'+ring.color+';border:1.5px solid '+ring.color+';border-radius:8px;font-size:9px;font-weight:900;white-space:nowrap;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.4)">'+ring.r+'m · 도보 '+ring.min+'분</div>',
      yAnchor:0.5, xAnchor:0.5
    });
    ringLabel.setMap(kkMap);
    kkRadiusItems.push(ringLabel);
  });
}

function kkDistMin(lat, lng){
  if(!kkCenter) return 1;
  const R=6371000, toRad=d=>d*Math.PI/180;
  const lat1=kkCenter.getLat(), lng1=kkCenter.getLng();
  const dLat=toRad(lat-lat1), dLng=toRad(lng-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat))*Math.sin(dLng/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.max(1, Math.round(R*c/67));
}

function kkAddPlace(cat, p){
  const lat = Number(p.y), lng = Number(p.x);
  if(!isFinite(lat) || !isFinite(lng)) return;
  if(KK_CATS[cat].code && p.category_group_code !== KK_CATS[cat].code) return;
  const min = kkDistMin(lat, lng);
  const pos = new kakao.maps.LatLng(lat, lng);
  const content = '<div class="kk-label '+cat+'" data-name="'+kkEscAttr(p.place_name)+'">'+kkEscHtml(p.place_name)+'</div>';
  const overlay = new kakao.maps.CustomOverlay({position:pos, content:content, yAnchor:1.1});
  overlay.setMap((kkCurrentCat === 'all' || kkCurrentCat === cat) ? kkMap : null);
  kkOverlays.push({cat, overlay, place:p, min, pos});
}

function kkBindClicks(){
  setTimeout(() => {
    document.querySelectorAll('#kakaoMap ~ .kakao-chips').forEach(()=>{}); // no-op
    document.querySelectorAll('.kk-label:not(.main)').forEach(el => {
      if(el.dataset.bound === '1') return;
      el.dataset.bound = '1';
      el.addEventListener('click', e => {
        e.stopPropagation();
        const name = el.getAttribute('data-name') || el.textContent;
        const item = kkOverlays.find(o => o.place.place_name === name);
        if(!item) return;
        const p = item.place;
        kkInfowindow.setContent(
          '<div class="kk-info"><b>'+kkEscHtml(p.place_name)+'</b>'+
          '<div class="dist">도보 약 '+item.min+'분 · '+KK_CATS[item.cat].name+'</div>'+
          '<div>'+kkEscHtml(p.road_address_name || p.address_name || '')+'</div>'+
          '<a target="_blank" rel="noopener" href="'+kkEscAttr(p.place_url||'')+'">카카오맵에서 보기</a></div>'
        );
        kkAnchor.setPosition(item.pos);
        kkInfowindow.open(kkMap, kkAnchor);
      });
    });
  }, 200);
}

    if(c.code){
      jobs.push(new Promise(resolve => {
        kkPlaces.categorySearch(c.code, (data, status) => {
          if(status === kakao.maps.services.Status.OK) data.slice(0,15).forEach(p => kkAddPlace(cat, p));
          resolve();
        }, {location:kkCenter, radius:1500, sort:kakao.maps.services.SortBy.DISTANCE, size:15});
      }));
    }
    c.keywords.forEach(k => {
      jobs.push(new Promise(resolve => {
        kkPlaces.keywordSearch(k, (data, status) => {
          if(status === kakao.maps.services.Status.OK) data.slice(0,5).forEach(p => kkAddPlace(cat, p));
          resolve();
        }, {location:kkCenter, radius:1500, sort:kakao.maps.services.SortBy.DISTANCE, size:5});
      }));
    });
  });
  Promise.all(jobs).then(() => {
    kkDedupe();
    kkUpdateCounts();
    kkFitBounds();
    kkBindClicks();
    kkUpdateTable();
    kkSetStatus('✓ 검색 완료 · '+kkOverlays.length+'개 시설 발견', '');
  }).catch(err => {
    console.error('Kakao search error:', err);
    kkSetStatus('⚠️ 검색 오류: '+err.message, 'err');
  });
}

function kkDedupe(){
  const seen = new Set();
  kkOverlays = kkOverlays.filter(o => {
    const key = o.place.id || (o.place.place_name+'|'+o.place.x+'|'+o.place.y);
    if(seen.has(key)){ o.overlay.setMap(null); return false; }
    seen.add(key); return true;
  });
}

function kkUpdateCounts(){
  const counts = {all:kkOverlays.length, work:0, shop:0, medical:0, school:0, park:0, subway:0};
  kkOverlays.forEach(o => counts[o.cat]++);
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('kk-cnt-'+k);
    if(el) el.textContent = counts[k];
  });
}

function kkFitBounds(){
  if(!kkCenter) return;
  const b = new kakao.maps.LatLngBounds();
  b.extend(kkCenter);
  kkOverlays.slice(0,40).forEach(o => b.extend(o.pos));
  if(!b.isEmpty()) kkMap.setBounds(b);
}

function kkFilter(cat){
  kkCurrentCat = cat;
  document.querySelectorAll('.kk-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  kkOverlays.forEach(o => o.overlay.setMap((cat === 'all' || o.cat === cat) ? kkMap : null));
  kkBindClicks();
}

function kkUpdateTable(){
  // 실측 데이터로 테이블 교체
  const tbody = document.getElementById('kk-facility-tbody');
  const cap = document.getElementById('kk-facility-cap');
  if(!tbody) return;
  
  // 카테고리별 가장 가까운 1-2개씩 선별
  const picks = {};
  kkOverlays.forEach(o => {
    if(!picks[o.cat]) picks[o.cat] = [];
    if(picks[o.cat].length < 2) picks[o.cat].push(o);
  });
  
  const rows = [];
  ['subway','work','shop','medical','school','park'].forEach(cat => {
    if(picks[cat]){
      picks[cat].forEach(o => {
        rows.push([KK_CATS[cat].name, o.place.place_name, o.min*67+'m', o.min+'분']);
      });
    }
  });
  
  if(rows.length > 0){
    tbody.innerHTML = rows.slice(0,8).map(r => `<tr><td class="name">${r[0]}</td><td>${r[1]}</td><td class="num">${r[2]}</td><td class="num">${r[3]}</td></tr>`).join('');
    if(cap) cap.textContent = '✓ 카카오 로컬 API 실측 (반경 1.5km / 도보 4km/h 기준)';
  }
}

function kkEscHtml(s){
  return String(s||'').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function kkEscAttr(s){
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function kkSearchAddress(addr){
  if(!kkReady || !kkGeocoder){
    kkSetStatus('지도 대기중... 잠시 후 자동 재시도', 'load');
    setTimeout(() => kkSearchAddress(addr), 500);
    return;
  }
  kkClear();
  kkSetStatus('주소 검색 중...', 'load');
  kkGeocoder.addressSearch(addr, (res, status) => {
    if(status === kakao.maps.services.Status.OK && res[0]){
      kkDrawCenter(new kakao.maps.LatLng(res[0].y, res[0].x), addr);
      kkSearchAll();
    } else {
      // 키워드 재시도
      kkPlaces.keywordSearch(addr, (data, s) => {
        if(s === kakao.maps.services.Status.OK && data[0]){
          kkDrawCenter(new kakao.maps.LatLng(data[0].y, data[0].x), data[0].place_name);
          kkSearchAll();
        } else {
          kkSetStatus('⚠️ 주소를 찾지 못했습니다', 'err');
        }
      });
    }
  });
}

// SDK 로드 핸들러
function kkOnSdkReady(){
  if(!window.kakao || !window.kakao.maps){
    kkSetStatus('⚠️ Kakao SDK 미로드 — 도메인 등록 또는 키 확인 필요', 'err');
    return;
  }
  kkSdkLoaded = true;
  kakao.maps.load(() => {
    if(kkInit()){
      const currentAddr = document.getElementById('addr').value.trim();
      if(currentAddr) kkSearchAddress(currentAddr);
    }
  });
}

// 칩 클릭 이벤트 위임
document.addEventListener('click', e => {
  const chip = e.target.closest('.kk-chip');
  if(chip && chip.dataset.cat){
    kkFilter(chip.dataset.cat);
  }
});

// SDK 로드 대기
if(window.kakao && window.kakao.maps){
  kkOnSdkReady();
} else {
  window.addEventListener('load', () => {
    setTimeout(kkOnSdkReady, 100);
  });
}

// 보고서 갱신시 지도도 함께 갱신
const _origApplyProject = applyProject;
applyProject = function(project, isMatched, regionLabel){
  _origApplyProject(project, isMatched, regionLabel);
  // 지도 재초기화 + 검색
  setTimeout(() => {
    if(kkReady){
      kkSearchAddress(project.cover.address);
    } else if(kkSdkLoaded){
      kkOnSdkReady();
    }
  }, 100);
};
</script>
